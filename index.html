<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendário 2026</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Segoe UI", sans-serif;
}

body{
  width:100vw;
  height:100vh;
  overflow:hidden;
  background:
    radial-gradient(circle at 45% 35%, rgba(120,0,0,.35), transparent 38%),
    linear-gradient(90deg,#050505,#090000 45%,#050505);
  color:white;
}

.container{
  width:100%;
  height:100%;
  display:grid;
  grid-template-columns:330px 360px 1fr;
  gap:24px;
  padding:24px;
}

/* PAINEL ESQUERDO */
.sidebar{
  border:1px solid rgba(228,178,83,.5);
  border-radius:28px;
  background:rgba(0,0,0,.62);
  padding:28px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.logo{
  font-family:Georgia,serif;
  font-style:italic;
  font-size:42px;
  color:#f4d58a;
}

.live{
  letter-spacing:4px;
  color:#f6e6b2;
  font-size:12px;
  margin:8px 0 28px;
}

.clock{
  width:190px;
  height:190px;
  border-radius:50%;
  border:2px solid rgba(228,178,83,.55);
  position:relative;
  margin-bottom:24px;
}

.clock::after{
  content:"";
  width:10px;
  height:10px;
  border-radius:50%;
  background:#f4d58a;
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
}

.hand{
  position:absolute;
  left:50%;
  bottom:50%;
  transform-origin:bottom;
  transform:translateX(-50%) rotate(0deg);
  border-radius:10px;
}

.hour{
  width:5px;
  height:50px;
  background:#ffe39b;
}

.minute{
  width:3px;
  height:72px;
  background:#ffd25e;
}

.second{
  width:2px;
  height:82px;
  background:#c9822d;
}

.digital{
  color:#f1c979;
  font-size:34px;
  margin-bottom:8px;
}

.date{
  font-size:14px;
  color:#eee;
  text-align:center;
  margin-bottom:34px;
}

.menu{
  width:100%;
  display:flex;
  flex-direction:column;
  gap:16px;
}

.menu button{
  padding:16px;
  border-radius:18px;
  background:rgba(255,255,255,.035);
  border:1px solid rgba(255,255,255,.08);
  color:white;
  font-size:18px;
  text-align:left;
  cursor:pointer;
}

.menu button.active,
.menu button:hover{
  background:linear-gradient(90deg,#5a3300,#8d5b15);
  border-color:#f3d07a;
}

/* FOTO NO MEIO */
.photo-box{
  display:flex;
  align-items:center;
  justify-content:center;
}

.photo-card{
  width:100%;
  border:1px solid rgba(228,178,83,.45);
  border-radius:24px;
  overflow:hidden;
  background:rgba(0,0,0,.55);
  box-shadow:0 0 35px rgba(0,0,0,.65);
}

.photo-card img{
  width:100%;
  display:block;
}

/* DIREITA */
.main{
  display:flex;
  flex-direction:column;
  gap:18px;
}

.top{
  text-align:center;
}

.top h1{
  font-family:Georgia,serif;
  font-size:82px;
  color:#f2c86f;
  line-height:.9;
}

.top p{
  color:#f6d985;
  letter-spacing:6px;
  font-size:14px;
  margin-top:8px;
}

.calendar-box{
  flex:1;
  border:1px solid rgba(228,178,83,.45);
  border-radius:28px;
  background:rgba(0,0,0,.62);
  padding:28px;
}

.calendar-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.calendar-header button{
  width:48px;
  height:48px;
  border-radius:50%;
  border:1px solid rgba(228,178,83,.55);
  background:rgba(0,0,0,.4);
  color:#f2c86f;
  font-size:30px;
  cursor:pointer;
}

.calendar-header h2{
  color:#f6d985;
  font-size:36px;
  letter-spacing:5px;
}

.weekdays,
.days{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:8px;
}

.weekdays div{
  text-align:center;
  color:#f2d07a;
  font-size:15px;
  padding-bottom:8px;
}

.weekdays div:first-child{
  color:#ff4a4a;
}

.days div{
  height:54px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:12px;
  background:rgba(255,255,255,.025);
  border:1px solid rgba(255,255,255,.05);
  font-size:22px;
  cursor:pointer;
}

.days div:hover{
  background:rgba(255,180,70,.18);
}

.today{
  background:linear-gradient(145deg,#a00000,#d14b32)!important;
  border:1px solid #ffb28a!important;
}

.months{
  display:grid;
  grid-template-columns:repeat(12,1fr);
  gap:7px;
  margin-top:18px;
}

.months button{
  padding:10px 0;
  border-radius:14px;
  border:1px solid rgba(255,200,90,.18);
  background:rgba(0,0,0,.45);
  color:#f6d985;
  cursor:pointer;
}

.months button.active,
.months button:hover{
  background:#8d5b15;
}

.tasks{
  height:150px;
  border:1px solid rgba(228,178,83,.45);
  border-radius:24px;
  background:rgba(0,0,0,.62);
  padding:20px;
}

.tasks h3{
  color:#f3d07a;
  font-family:Georgia,serif;
  font-size:26px;
  margin-bottom:10px;
}

.tasks textarea{
  width:100%;
  height:55px;
  background:transparent;
  border:none;
  outline:none;
  resize:none;
  color:white;
  font-size:16px;
}

.name{
  color:#f3d07a;
  font-family:Georgia,serif;
  font-style:italic;
  font-size:22px;
  text-align:center;
}
</style>
</head>

<body>

<div class="container">

  <aside class="sidebar">
    <div class="logo">Il Volo</div>
    <div class="live">LIVE IN CONCERT</div>

    <div class="clock">
      <div class="hand hour" id="hour"></div>
      <div class="hand minute" id="minute"></div>
      <div class="hand second" id="second"></div>
    </div>

    <div class="digital" id="digital">00:00:00</div>
    <div class="date" id="date">---</div>

    <div class="menu">
      <button class="active">▣ Calendário</button>
      <button>☰ Agenda</button>
      <button>□ Notas</button>
      <button>☑ Tarefas</button>
    </div>
  </aside>

  <section class="photo-box">
    <div class="photo-card">
      <img src="fundo.jpg" alt="Foto">
    </div>
  </section>

  <main class="main">
    <div class="top">
      <h1>2026</h1>
      <p>FAITH • MUSIC • FRIENDSHIP</p>
    </div>

    <section class="calendar-box">
      <div class="calendar-header">
        <button onclick="prevMonth()">‹</button>
        <h2 id="monthTitle">MAIO 2026</h2>
        <button onclick="nextMonth()">›</button>
      </div>

      <div class="weekdays">
        <div>DOM</div><div>SEG</div><div>TER</div><div>QUA</div><div>QUI</div><div>SEX</div><div>SÁB</div>
      </div>

      <div class="days" id="days"></div>

      <div class="months" id="months"></div>
    </section>

    <section class="tasks">
      <h3>TAREFAS</h3>
      <textarea placeholder="Escreve aqui..."></textarea>
      <div class="name">Ana Lúcia Lourenço ♡</div>
    </section>
  </main>

</div>

<script>
const monthNames=[
'JANEIRO','FEVEREIRO','MARÇO','ABRIL','MAIO','JUNHO',
'JULHO','AGOSTO','SETEMBRO','OUTUBRO','NOVEMBRO','DEZEMBRO'
];

const shortMonths=['JAN','FEV','MAR','ABR','MAI','JUN','JUL','AGO','SET','OUT','NOV','DEZ'];

let currentMonth=4;
const year=2026;

const days=document.getElementById("days");
const monthTitle=document.getElementById("monthTitle");
const months=document.getElementById("months");

function renderCalendar(){
  days.innerHTML="";
  months.innerHTML="";
  monthTitle.textContent=monthNames[currentMonth]+" 2026";

  const firstDay=new Date(year,currentMonth,1).getDay();
  const totalDays=new Date(year,currentMonth+1,0).getDate();
  const today=new Date();

  for(let i=0;i<firstDay;i++){
    days.innerHTML+="<div></div>";
  }

  for(let d=1;d<=totalDays;d++){
    const isToday=today.getFullYear()===year && today.getMonth()===currentMonth && today.getDate()===d;
    days.innerHTML+=`<div class="${isToday?'today':''}">${d}</div>`;
  }

  shortMonths.forEach((m,i)=>{
    const btn=document.createElement("button");
    btn.textContent=m;
    if(i===currentMonth) btn.classList.add("active");
    btn.onclick=()=>{currentMonth=i;renderCalendar();};
    months.appendChild(btn);
  });
}

function prevMonth(){
  currentMonth=currentMonth===0?11:currentMonth-1;
  renderCalendar();
}

function nextMonth(){
  currentMonth=currentMonth===11?0:currentMonth+1;
  renderCalendar();
}

function updateClock(){
  const now=new Date();

  const h=now.getHours();
  const m=now.getMinutes();
  const s=now.getSeconds();

  document.getElementById("hour").style.transform=`translateX(-50%) rotate(${(h%12)*30+m*.5}deg)`;
  document.getElementById("minute").style.transform=`translateX(-50%) rotate(${m*6}deg)`;
  document.getElementById("second").style.transform=`translateX(-50%) rotate(${s*6}deg)`;

  document.getElementById("digital").textContent=now.toLocaleTimeString("pt-PT");
  document.getElementById("date").textContent=now.toLocaleDateString("pt-PT",{
    weekday:"long",
    day:"numeric",
    month:"long",
    year:"numeric"
  });
}

renderCalendar();
updateClock();
setInterval(updateClock,1000);
</script>

</body>
</html>
