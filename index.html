<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendário Interativo 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
width:100%;
height:100vh;
overflow:hidden;
font-family:'Segoe UI',sans-serif;
background:
linear-gradient(rgba(0,0,0,0.82),rgba(0,0,0,0.88)),
url('fundo.jpg') center center/cover no-repeat fixed;
color:white;
}

body::before{
content:"";
position:absolute;
inset:0;
background:
radial-gradient(circle at top,#7a000044,transparent 40%),
radial-gradient(circle at bottom,#aa330022,transparent 35%);
pointer-events:none;
}

.container{
position:relative;
z-index:2;
display:grid;
grid-template-columns:380px 1fr;
height:100vh;
padding:20px;
gap:25px;
}

/* MENU */

.sidebar{
background:rgba(0,0,0,0.62);
border:1px solid rgba(212,167,74,0.45);
border-radius:32px;
backdrop-filter:blur(12px);
padding:30px;
display:flex;
flex-direction:column;
justify-content:space-between;
box-shadow:0 0 40px rgba(0,0,0,0.5);
}

.logo{
text-align:center;
margin-bottom:10px;
}

.logo h1{
font-family:'Playfair Display',serif;
font-size:3rem;
color:#f3d07a;
}

.logo p{
letter-spacing:5px;
font-size:0.95rem;
margin-top:5px;
color:#f6e6b2;
}

/* RELÓGIO */

.clock-box{
display:flex;
flex-direction:column;
align-items:center;
margin-top:10px;
}

.clock{
width:210px;
height:210px;
border:2px solid rgba(212,167,74,0.5);
border-radius:50%;
position:relative;
background:rgba(30,0,0,0.35);
box-shadow:0 0 25px rgba(255,180,70,0.12);
}

.center-dot{
width:12px;
height:12px;
background:#f3d07a;
border-radius:50%;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
z-index:10;
}

.hand{
position:absolute;
bottom:50%;
left:50%;
transform-origin:bottom;
transform:translateX(-50%) rotate(0deg);
border-radius:10px;
}

.hour{
width:5px;
height:55px;
background:#ffe39b;
}

.minute{
width:3px;
height:78px;
background:#ffd25e;
}

.second{
width:2px;
height:90px;
background:#b56b00;
}

.number{
position:absolute;
width:100%;
height:100%;
font-size:1.1rem;
color:#e5c46d;
}

.number span{
position:absolute;
left:50%;
top:50%;
transform-origin:center;
}

.digital{
margin-top:22px;
font-size:3rem;
font-family:'Cinzel',serif;
color:#f2c86f;
}

.date{
margin-top:8px;
font-size:1.2rem;
color:#f1f1f1;
}

/* BOTÕES */

.menu{
margin-top:35px;
display:flex;
flex-direction:column;
gap:18px;
}

.menu button{
background:rgba(20,0,0,0.55);
border:1px solid rgba(255,200,90,0.18);
color:white;
padding:20px;
border-radius:22px;
font-size:1.5rem;
cursor:pointer;
transition:0.3s;
display:flex;
align-items:center;
gap:15px;
}

.menu button:hover,
.menu button.active{
background:linear-gradient(90deg,#5a3300,#8d5b15);
border-color:#f3d07a;
transform:translateY(-2px);
}

.name{
margin-top:30px;
text-align:center;
font-family:'Playfair Display',serif;
font-size:2rem;
line-height:1.2;
color:#f3d07a;
}

/* DIREITA */

.main{
display:flex;
flex-direction:column;
gap:20px;
}

.top{
text-align:center;
padding-top:5px;
}

.top h2{
font-size:7rem;
font-family:'Playfair Display',serif;
color:#f2c86f;
line-height:1;
text-shadow:0 0 20px rgba(255,190,70,0.18);
}

.top p{
margin-top:10px;
letter-spacing:8px;
font-size:1.2rem;
color:#f6d985;
}

/* CALENDÁRIO */

.calendar-box{
flex:1;
background:rgba(0,0,0,0.62);
border:1px solid rgba(212,167,74,0.45);
border-radius:35px;
backdrop-filter:blur(12px);
padding:35px;
display:flex;
flex-direction:column;
justify-content:space-between;
}

.calendar-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.calendar-header button{
width:58px;
height:58px;
border-radius:50%;
border:1px solid rgba(212,167,74,0.5);
background:rgba(0,0,0,0.55);
color:#f2c86f;
font-size:2rem;
cursor:pointer;
}

.calendar-header h3{
font-size:4rem;
font-family:'Cinzel',serif;
color:#f6d985;
}

.weekdays,
.days{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:12px;
}

.weekdays div{
text-align:center;
font-size:1.4rem;
padding-bottom:10px;
color:#f2d07a;
}

.days div{
height:90px;
display:flex;
align-items:center;
justify-content:center;
border-radius:18px;
font-size:2rem;
background:rgba(255,255,255,0.02);
border:1px solid rgba(255,255,255,0.04);
transition:0.3s;
cursor:pointer;
}

.days div:hover{
background:rgba(255,180,70,0.18);
transform:scale(1.04);
}

.today{
background:linear-gradient(145deg,#a00000,#d14b32)!important;
border:1px solid #ffb28a!important;
box-shadow:0 0 20px rgba(255,80,50,0.3);
}

/* MESES */

.months{
display:grid;
grid-template-columns:repeat(12,1fr);
gap:10px;
margin-top:25px;
}

.months button{
padding:14px 0;
border:none;
border-radius:18px;
background:rgba(0,0,0,0.55);
color:#f6d985;
font-size:1rem;
cursor:pointer;
border:1px solid rgba(255,200,90,0.15);
transition:0.3s;
}

.months button:hover,
.months button.active{
background:#8d5b15;
transform:translateY(-2px);
}

/* TAREFAS */

.tasks{
height:170px;
background:rgba(0,0,0,0.62);
border:1px solid rgba(212,167,74,0.45);
border-radius:28px;
padding:25px;
backdrop-filter:blur(12px);
}

.tasks h4{
font-size:2.2rem;
font-family:'Playfair Display',serif;
color:#f3d07a;
margin-bottom:15px;
}

.tasks textarea{
width:100%;
height:80px;
background:transparent;
border:none;
outline:none;
resize:none;
color:white;
font-size:1.2rem;
}

@media(max-width:1400px){

.container{
grid-template-columns:320px 1fr;
}

.calendar-header h3{
font-size:3rem;
}

.days div{
height:70px;
font-size:1.5rem;
}

.top h2{
font-size:5rem;
}

}

</style>
</head>

<body>

<div class="container">

<aside class="sidebar">

<div>

<div class="logo">
<h1>Il Volo</h1>
<p>LIVE IN CONCERT</p>
</div>

<div class="clock-box">

<div class="clock">

<div class="number"><span style="transform:translate(-50%,-50%) rotate(0deg) translateY(-92px);">12</span></div>

<div class="center-dot"></div>

<div class="hand hour" id="hour"></div>
<div class="hand minute" id="minute"></div>
<div class="hand second" id="second"></div>

</div>

<div class="digital" id="digital"></div>
<div class="date" id="date"></div>

</div>

<div class="menu">

<button class="active">▣ Calendário</button>
<button>☰ Agenda</button>
<button>□ Notas</button>
<button>☑ Tarefas</button>

</div>

<div class="name">
Ana Lúcia<br>Lourenço
</div>

</div>

</aside>

<main class="main">

<div class="top">
<h2>2026</h2>
<p>FAITH • MUSIC • FRIENDSHIP</p>
</div>

<div class="calendar-box">

<div class="calendar-header">
<button>‹</button>
<h3>MAIO 2026</h3>
<button>›</button>
</div>

<div class="weekdays">
<div>DOM</div>
<div>SEG</div>
<div>TER</div>
<div>QUA</div>
<div>QUI</div>
<div>SEX</div>
<div>SÁB</div>
</div>

<div class="days">

<div></div>
<div></div>
<div></div>
<div></div>
<div>1</div>
<div>2</div>
<div>3</div>

<div>4</div>
<div>5</div>
<div>6</div>
<div>7</div>
<div>8</div>
<div class="today">9</div>
<div>10</div>

<div>11</div>
<div>12</div>
<div>13</div>
<div>14</div>
<div>15</div>
<div>16</div>
<div>17</div>

<div>18</div>
<div>19</div>
<div>20</div>
<div>21</div>
<div>22</div>
<div>23</div>
<div>24</div>

<div>25</div>
<div>26</div>
<div>27</div>
<div>28</div>
<div>29</div>
<div>30</div>
<div>31</div>

</div>

<div class="months">

<button>JAN</button>
<button>FEV</button>
<button>MAR</button>
<button>ABR</button>
<button class="active">MAI</button>
<button>JUN</button>
<button>JUL</button>
<button>AGO</button>
<button>SET</button>
<button>OUT</button>
<button>NOV</button>
<button>DEZ</button>

</div>

</div>

<div class="tasks">
<h4>TAREFAS</h4>
<textarea placeholder="Escreve aqui..."></textarea>
</div>

</main>

</div>

<script>

function updateClock(){

const now = new Date();

const hours = now.getHours();
const minutes = now.getMinutes();
const seconds = now.getSeconds();

const hourDeg = (hours % 12) * 30 + minutes * 0.5;
const minuteDeg = minutes * 6;
const secondDeg = seconds * 6;

document.getElementById('hour').style.transform =
`translateX(-50%) rotate(${hourDeg}deg)`;

document.getElementById('minute').style.transform =
`translateX(-50%) rotate(${minuteDeg}deg)`;

document.getElementById('second').style.transform =
`translateX(-50%) rotate(${secondDeg}deg)`;

document.getElementById('digital').innerHTML =
now.toLocaleTimeString('pt-PT');

document.getElementById('date').innerHTML =
now.toLocaleDateString('pt-PT',{
weekday:'long',
day:'numeric',
month:'long',
year:'numeric'
});

}

setInterval(updateClock,1000);
updateClock();

</script>

</body>
</html>
